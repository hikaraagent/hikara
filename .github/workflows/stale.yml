name: stale

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-message: |
            no activity for 60 days. closing in 14 if nothing new lands.
            reopen with new evidence if the issue still bites.
          stale-pr-message: |
            no activity for 60 days. closing in 14 unless someone picks it up.
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,roadmap"
          exempt-pr-labels: "pinned,security"
